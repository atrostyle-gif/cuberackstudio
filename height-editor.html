<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>段ごとの高さ 編集</title>
  <style>
    body {
      margin: 0;
      padding: 12px 14px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12px;
      margin: 4px 0 8px;
      color: #4b5563;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      box-sizing: border-box;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      resize: vertical;
    }
    .btn-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    button {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
  </style>
</head>
<body>
  <h1>段ごとの高さを編集</h1>
  <p>
    カンマ区切りで段の高さを入力してください。<br>
    例: <code>300, 300, 400</code>
  </p>

  <textarea id="height-input"></textarea>

  <div class="btn-row">
    <button class="btn-secondary" type="button" onclick="window.close();">
      キャンセル
    </button>
    <button class="btn-primary" type="button" id="apply-btn">
      適用して閉じる
    </button>
  </div>

  <script>
    function initFromMain() {
      if (!window.opener || window.opener.closed) return;
      const mainDoc = window.opener.document;
      const src = mainDoc.getElementById("auto-height-list");
      const ta  = document.getElementById("height-input");
      if (src && ta) {
        ta.value = src.value || "";
      }
    }

    function applyToMain() {
      if (!window.opener || window.opener.closed) {
        alert("メイン画面が見つかりません。先にメイン画面を開いてください。");
        return;
      }
      const mainDoc = window.opener.document;
      const dst = mainDoc.getElementById("auto-height-list");
      const ta  = document.getElementById("height-input");
      if (dst && ta) {
        dst.value = ta.value.trim();
      }

      // メイン側で自動レイアウトを再生成
      if (window.opener.autoGenerateModules) {
        window.opener.autoGenerateModules();
      }

      window.close();
    }

    window.addEventListener("load", () => {
      initFromMain();
      const btn = document.getElementById("apply-btn");
      if (btn) btn.addEventListener("click", applyToMain);
    });
  </script>
</body>
</html>
