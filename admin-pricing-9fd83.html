<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow">
  <title>価格表管理</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: rgba(0, 0, 0, 0.08);
      --accent: #007aff;
      --accent-disabled: #a8c8f5;
      --danger: #ff3b30;
      --warn: #ff9500;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 32px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .card--flush { padding: 0; overflow: hidden; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 1;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:disabled {
      background: var(--accent-disabled);
      color: rgba(255, 255, 255, 0.9);
    }

    .btn-secondary {
      background: rgba(0, 0, 0, 0.06);
      color: var(--text);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(0, 0, 0, 0.1);
    }

    .btn-ghost {
      background: transparent;
      color: var(--accent);
      padding: 10px 4px;
    }

    .edit-state {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      min-height: 1.4em;
    }

    .edit-state.is-saved { color: #34c759; }
    .edit-state.is-dirty { color: var(--warn); }
    .edit-state.is-saving { color: var(--muted); }
    .edit-state.is-error { color: var(--danger); }

    .login-card {
      max-width: 400px;
      margin: 80px auto;
    }

    .login-card label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      background: var(--bg);
    }

    .login-error {
      margin-top: 12px;
      font-size: 14px;
      color: var(--danger);
      min-height: 1.2em;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 16px 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      appearance: none;
      border: none;
      background: transparent;
      padding: 10px 4px 14px;
      margin-bottom: -1px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-panel {
      padding: 8px 0 16px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 12px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tr:last-child td { border-bottom: none; }

    td input[type="number"] {
      width: 96px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg);
    }

    td input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }

    .hidden { display: none !important; }

    /* 管理メニュー（シート） */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 24px;
    }

    .sheet {
      width: min(100%, 400px);
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
    }

    .sheet-title {
      padding: 18px 20px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .sheet-list { list-style: none; margin: 0; padding: 0; }

    .sheet-list button {
      display: block;
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      color: var(--text);
    }

    .sheet-list button:last-child { border-bottom: none; }
    .sheet-list button:hover { background: rgba(0, 0, 0, 0.04); }
    .sheet-list button.danger { color: var(--danger); }

    .integrity-card {
      font-size: 14px;
      line-height: 1.5;
    }

    .integrity-card h2 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 12px;
    }

    @media (max-width: 480px) {
      .page { padding: 32px 16px 64px; }
      .page-title { font-size: 24px; margin-bottom: 24px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="page login-card hidden">
    <div class="card">
      <h1 class="page-title" style="margin-bottom:24px;font-size:22px;">価格表管理</h1>
      <label for="loginPassword">パスワード</label>
      <input id="loginPassword" type="password" autocomplete="current-password" />
      <div style="margin-top:20px;">
        <button type="button" class="btn btn-primary" id="btnLogin" style="width:100%;">ログイン</button>
      </div>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="adminApp" class="page hidden">
    <h1 class="page-title">価格表管理</h1>

    <div class="card">
      <div class="toolbar">
        <button type="button" class="btn btn-primary" id="btnSave" disabled>💾 保存</button>
        <button type="button" class="btn btn-secondary" id="btnManage">⚙ 管理</button>
      </div>
      <div id="editState" class="edit-state is-saved">✔ 保存済み</div>
    </div>

    <div id="integrityPanel" class="card integrity-card hidden"></div>

    <div class="card card--flush">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="basic">基本パーツ</button>
        <button type="button" class="tab" data-tab="material">材種別</button>
        <button type="button" class="tab" data-tab="board">棚板</button>
        <button type="button" class="tab" data-tab="panel">壁板</button>
      </div>
      <div class="tab-panel" id="tab-basic"></div>
      <div class="tab-panel hidden" id="tab-material"></div>
      <div class="tab-panel hidden" id="tab-board"></div>
      <div class="tab-panel hidden" id="tab-panel"></div>
    </div>
  </div>

  <div id="manageSheet" class="sheet-backdrop hidden" aria-hidden="true">
    <div class="sheet" role="dialog">
      <div class="sheet-title">管理</div>
      <ul class="sheet-list">
        <li><button type="button" id="btnReload">🔄 再読込</button></li>
        <li><button type="button" id="btnIntegrity">整合性チェック</button></li>
        <li><button type="button" id="btnBackup">JSONバックアップ</button></li>
        <li><button type="button" id="btnLogout" class="danger">ログアウト</button></li>
      </ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/config/pricing-config.js"></script>
  <script src="js/data/parts-catalog.js"></script>
  <script src="js/app/order-pricing.js"></script>
  <script src="js/data/price-loader.js"></script>
  <script>
    const AUTH_KEY = "cuberack_price_admin_auth";
    const loginScreen = document.getElementById("loginScreen");
    const adminApp = document.getElementById("adminApp");
    const loginPasswordEl = document.getElementById("loginPassword");
    const loginErrorEl = document.getElementById("loginError");
    const editStateEl = document.getElementById("editState");
    const btnSave = document.getElementById("btnSave");
    const manageSheet = document.getElementById("manageSheet");
    const integrityPanel = document.getElementById("integrityPanel");

    let catalog = { partsCatalog: {}, partPriceByMaterial: {}, scaffoldBoardPrices: {}, scaffoldPanelPrices: {} };
    let savedSnapshot = "";
    let sessionPassword = "";
    let isSaving = false;

    function snapshotCatalog(data) {
      const c = JSON.parse(JSON.stringify(data));
      delete c.updatedAt;
      return JSON.stringify(c);
    }

    function isDirty() {
      collectFromDom();
      return snapshotCatalog(catalog) !== savedSnapshot;
    }

    function setEditState(mode) {
      editStateEl.className = "edit-state";
      if (mode === "saving") {
        editStateEl.classList.add("is-saving");
        editStateEl.textContent = "保存中…";
        btnSave.disabled = true;
        return;
      }
      if (mode === "error") {
        editStateEl.classList.add("is-error");
        editStateEl.textContent = "保存に失敗しました";
        updateSaveButton();
        return;
      }
      if (isDirty()) {
        editStateEl.classList.add("is-dirty");
        editStateEl.textContent = "● 未保存の変更があります";
      } else {
        editStateEl.classList.add("is-saved");
        editStateEl.textContent = "✔ 保存済み";
      }
      updateSaveButton();
    }

    function updateSaveButton() {
      btnSave.disabled = isSaving || !isDirty();
    }

    function markSavedBaseline() {
      collectFromDom();
      savedSnapshot = snapshotCatalog(catalog);
      setEditState("saved");
    }

    function onCatalogEdited() {
      if (!isSaving) setEditState("dirty");
    }

    function getExpectedPassword() {
      return (window.PRICING_CONFIG && window.PRICING_CONFIG.adminPassword) || "";
    }

    function collectFromDom() {
      document.querySelectorAll("tr[data-group]").forEach((tr) => {
        const group = tr.dataset.group;
        const key = tr.dataset.key;
        if (!group || !key) return;

        if (group === "partsCatalog") {
          const input = tr.querySelector('input[data-field="unitPrice"]');
          const price = Number(input?.value) || 0;
          if (!catalog.partsCatalog[key]) catalog.partsCatalog[key] = {};
          catalog.partsCatalog[key].unitPrice = price;
          if (catalog.partPriceByMaterial[key]) {
            catalog.partPriceByMaterial[key].IRON = price;
          }
        } else if (group === "partPriceByMaterial") {
          if (!catalog.partPriceByMaterial[key]) catalog.partPriceByMaterial[key] = {};
          tr.querySelectorAll("input[data-mat]").forEach((inp) => {
            const mat = inp.dataset.mat;
            const v = inp.value.trim();
            if (v === "") return;
            catalog.partPriceByMaterial[key][mat] = Number(v) || 0;
          });
        } else if (group === "scaffoldBoardPrices" || group === "scaffoldPanelPrices") {
          const input = tr.querySelector("input");
          catalog[group][key] = Number(input?.value) || 0;
        }
      });
    }

    function bindTableInputs() {
      document.querySelectorAll("#adminApp input[type='number']").forEach((inp) => {
        inp.addEventListener("input", onCatalogEdited);
        inp.addEventListener("change", onCatalogEdited);
      });
    }

    function sortKeys(keys) {
      return typeof window.sortPriceCatalogKeys === "function"
        ? window.sortPriceCatalogKeys(keys)
        : keys.slice().sort();
    }

    function renderBasicTable() {
      const el = document.getElementById("tab-basic");
      const keys = sortKeys(
        Object.keys(catalog.partsCatalog || {}).filter((k) => {
          const v = catalog.partsCatalog[k];
          return v && typeof v.unitPrice === "number";
        })
      );
      el.innerHTML = `<table><thead><tr><th>キー</th><th>名称</th><th>単価</th></tr></thead><tbody>${
        keys.map((k) => {
          const item = catalog.partsCatalog[k];
          return `<tr data-group="partsCatalog" data-key="${k}">
            <td>${k}</td><td>${item.label || ""}</td>
            <td><input type="number" min="0" step="1" value="${item.unitPrice || 0}" data-field="unitPrice" /></td>
          </tr>`;
        }).join("")
      }</tbody></table>`;
    }

    function renderMaterialTable() {
      const el = document.getElementById("tab-material");
      const map = catalog.partPriceByMaterial || {};
      const keys = sortKeys(Object.keys(map));
      el.innerHTML = `<table><thead><tr><th>キー</th><th>IRON</th><th>BS</th><th>SUS</th></tr></thead><tbody>${
        keys.map((k) => {
          const row = map[k] || {};
          return `<tr data-group="partPriceByMaterial" data-key="${k}">
            <td>${k}</td>
            <td><input type="number" min="0" step="1" value="${row.IRON ?? ""}" data-mat="IRON" /></td>
            <td><input type="number" min="0" step="1" value="${row.BS ?? ""}" data-mat="BS" /></td>
            <td><input type="number" min="0" step="1" value="${row.SUS ?? ""}" data-mat="SUS" /></td>
          </tr>`;
        }).join("")
      }</tbody></table>`;
    }

    function renderSizeTable(targetId, groupName, tableObj) {
      const el = document.getElementById(targetId);
      const keys = Object.keys(tableObj || {}).sort();
      el.innerHTML = `<table><thead><tr><th>サイズ</th><th>単価</th></tr></thead><tbody>${
        keys.map((k) => `<tr data-group="${groupName}" data-key="${k}">
          <td>${k}</td><td><input type="number" min="0" step="1" value="${tableObj[k] || 0}" /></td>
        </tr>`).join("")
      }</tbody></table>`;
    }

    function renderAll() {
      renderBasicTable();
      renderMaterialTable();
      renderSizeTable("tab-board", "scaffoldBoardPrices", catalog.scaffoldBoardPrices);
      renderSizeTable("tab-panel", "scaffoldPanelPrices", catalog.scaffoldPanelPrices);
      bindTableInputs();
    }

    function cloneCatalog(data) {
      return JSON.parse(JSON.stringify(data));
    }

    async function reloadCatalog() {
      const remote = await window.fetchRemoteCatalog();
      if (remote) {
        catalog = cloneCatalog(remote);
      } else if (typeof window.exportPriceCatalogSnapshot === "function") {
        catalog = window.exportPriceCatalogSnapshot();
      }
      renderAll();
      markSavedBaseline();
    }

    function renderIntegrityResult(result) {
      if (!result) {
        integrityPanel.classList.add("hidden");
        return;
      }
      integrityPanel.classList.remove("hidden");
      const summary = result.ok
        ? `問題なし（${result.checkedCount} 項目）`
        : `要確認（${result.issues.length} 件）`;
      integrityPanel.innerHTML = `<h2>整合性チェック — ${summary}</h2>${
        result.issues.length
          ? `<table><thead><tr><th>パーツ</th><th>項目</th><th>内容</th></tr></thead><tbody>${result.issues.map((r) =>
              `<tr><td>${r.key}</td><td>${r.field}</td><td>${r.message}</td></tr>`
            ).join("")}</tbody></table>`
          : "<p style=\"color:var(--muted);margin:0;\">価格表に問題は見つかりませんでした。</p>"
      }`;
    }

    function openManageSheet() {
      manageSheet.classList.remove("hidden");
      manageSheet.setAttribute("aria-hidden", "false");
    }

    function closeManageSheet() {
      manageSheet.classList.add("hidden");
      manageSheet.setAttribute("aria-hidden", "true");
    }

    function showAdmin() {
      loginScreen.classList.add("hidden");
      adminApp.classList.remove("hidden");
      reloadCatalog().catch(() => {
        if (typeof window.exportPriceCatalogSnapshot === "function") {
          catalog = window.exportPriceCatalogSnapshot();
          renderAll();
          markSavedBaseline();
        }
      });
    }

    function showLogin() {
      sessionPassword = "";
      isSaving = false;
      sessionStorage.removeItem(AUTH_KEY);
      adminApp.classList.add("hidden");
      loginScreen.classList.remove("hidden");
      loginPasswordEl.value = "";
      loginErrorEl.textContent = "";
      closeManageSheet();
      integrityPanel.classList.add("hidden");
    }

    function tryLogin() {
      const expected = getExpectedPassword();
      const input = loginPasswordEl.value;
      if (!expected) {
        loginErrorEl.textContent = "管理者パスワードが設定されていません。";
        return;
      }
      if (input !== expected) {
        loginErrorEl.textContent = "パスワードが正しくありません。";
        return;
      }
      sessionPassword = input;
      sessionStorage.setItem(AUTH_KEY, "1");
      loginErrorEl.textContent = "";
      showAdmin();
    }

    document.getElementById("btnLogin").addEventListener("click", tryLogin);
    loginPasswordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryLogin();
    });

    document.getElementById("btnLogout").addEventListener("click", () => {
      closeManageSheet();
      showLogin();
    });

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tab-panel").forEach((panel) => {
          panel.classList.toggle("hidden", panel.id !== `tab-${tab}`);
        });
      });
    });

    document.getElementById("btnManage").addEventListener("click", openManageSheet);
    manageSheet.addEventListener("click", (e) => {
      if (e.target === manageSheet) closeManageSheet();
    });

    document.getElementById("btnReload").addEventListener("click", async () => {
      closeManageSheet();
      try {
        await reloadCatalog();
      } catch (_) {
        setEditState("error");
        editStateEl.textContent = "読み込みに失敗しました";
        editStateEl.className = "edit-state is-error";
      }
    });

    btnSave.addEventListener("click", async () => {
      if (isSaving || !isDirty()) return;
      collectFromDom();
      if (!sessionPassword) {
        showLogin();
        return;
      }
      isSaving = true;
      setEditState("saving");
      try {
        catalog.updatedAt = new Date().toISOString();
        await window.savePriceCatalog(catalog, { adminPassword: sessionPassword });
        isSaving = false;
        markSavedBaseline();
      } catch (_) {
        isSaving = false;
        setEditState("error");
      }
    });

    document.getElementById("btnIntegrity").addEventListener("click", () => {
      collectFromDom();
      if (typeof window.checkPriceCatalogIntegrity === "function") {
        renderIntegrityResult(window.checkPriceCatalogIntegrity(catalog));
      }
      closeManageSheet();
    });

    document.getElementById("btnBackup").addEventListener("click", () => {
      collectFromDom();
      const blob = new Blob([JSON.stringify(catalog, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "cuberack-prices.json";
      a.click();
      URL.revokeObjectURL(a.href);
      closeManageSheet();
    });

    if (sessionStorage.getItem(AUTH_KEY) === "1" && getExpectedPassword()) {
      sessionPassword = getExpectedPassword();
      showAdmin();
    } else {
      loginScreen.classList.remove("hidden");
    }
  </script>
</body>
</html>
